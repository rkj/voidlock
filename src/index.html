<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voidlock — Terminal Assets</title>
    <style>
      /* Prevent pre-CSS flash of non-menu screens. */
      #app > .screen {
        display: none;
      }
      #screen-main-menu {
        display: flex;
      }
    </style>
    <link rel="stylesheet" href="/styles/main.css" />
    <link rel="stylesheet" href="/styles/tutorial.css" />
    <script>
      (function () {
        // Mobile touch detection (ADR 0038)
        if (window.matchMedia("(pointer: coarse)").matches) {
          document.documentElement.classList.add("mobile-touch");
          window.addEventListener("DOMContentLoaded", function () {
            document.body.classList.add("mobile-touch");
          });
        }

        /**
         * Panic UI Recovery (ADR-0019/Spec 8.12)
         * Forces the Main Menu to be visible if a catastrophic error occurs.
         */
        function panic(error) {
          if (window.__VOIDLOCK_PANIC__) return;
          window.__VOIDLOCK_PANIC__ = true;

          console.error(
            "PANIC: Unhandled exception detected. Forcing UI recovery.",
            error,
          );

          // Native browser dialog (Spec 8.12 / voidlock-fi6n)
          if (
            confirm(
              "CRITICAL ERROR:\n" +
                error +
                "\n\nWould you like to RESET ALL DATA and reload the page to recover from this broken state?",
            )
          ) {
            localStorage.clear();
            window.location.reload();
            return;
          }

          if (
            window.GameAppInstance &&
            typeof window.GameAppInstance.stop === "function"
          ) {
            try {
              window.GameAppInstance.stop();
            } catch (e) {}
          }

          const showPanicUI = function () {
            const mainMenu = document.getElementById("screen-main-menu");
            if (mainMenu) {
              mainMenu.style.cssText =
                "display: flex !important; position: fixed !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important; z-index: 99999 !important; background-color: #111 !important; align-items: center !important; justify-content: center !important; flex-direction: column !important;";

              const errorMsg = document.createElement("div");
              errorMsg.style.cssText =
                "color: #ff4444; margin-top: 20px; padding: 10px; border: 1px solid #ff4444; max-width: 80%; font-size: 0.8em; background: rgba(255,0,0,0.1); font-family: monospace; text-align: left; overflow: auto; max-height: 200px;";
              errorMsg.textContent = "CRITICAL ERROR: " + error;
              mainMenu.appendChild(errorMsg);
            }

            const screens = document.querySelectorAll(".screen");
            for (let i = 0; i < screens.length; i++) {
              if (screens[i].id !== "screen-main-menu") {
                screens[i].style.display = "none";
              }
            }
          };

          if (document.readyState === "loading") {
            window.addEventListener("DOMContentLoaded", showPanicUI);
          } else {
            showPanicUI();
          }
        }

        window.__VOIDLOCK_PANIC_HANDLER__ = panic;

        window.addEventListener(
          "error",
          function (event) {
            if (event.target && (event.target.src || event.target.href)) {
              panic(
                "Resource failed to load: " +
                  (event.target.src || event.target.href),
              );
            } else {
              panic(event.error || event.message);
            }
          },
          true,
        );

        window.addEventListener("unhandledrejection", function (event) {
          panic(event.reason);
        });

        /**
         * Emergency Reset (Spec 8.12)
         * Provides an independent listener for the Reset Data button that works
         * even if the main application bundle fails to load or initialize.
         */
        window.addEventListener("DOMContentLoaded", function () {
          const resetBtn = document.getElementById("btn-menu-reset");
          if (resetBtn) {
            resetBtn.addEventListener("click", function (e) {
              const isAppHealthy =
                window.GameAppInstance && !window.__VOIDLOCK_PANIC__;
              if (!isAppHealthy) {
                if (
                  confirm(
                    "EMERGENCY RESET: This will wipe ALL local data and reload the page. Continue?",
                  )
                ) {
                  localStorage.clear();
                  window.location.reload();
                }
                e.stopImmediatePropagation();
              }
            });
          }
        });
      })();
    </script>
  </head>
  <body>
    <div id="app">
      <!-- 1. Main Menu -->
      <div id="screen-main-menu" class="screen screen-centered">
        <div class="title-splash" aria-hidden="true">
          <picture class="title-splash-image-wrap">
            <source srcset="/Voidlock.webp" type="image/webp" />
            <img
              class="title-splash-image"
              src="/Voidlock.png"
              alt=""
              decoding="async"
            />
          </picture>
          <div class="title-splash-vignette"></div>
        </div>

        <div class="main-menu-content">
          <h1>Voidlock</h1>
          <p class="menu-subtitle">Terminal Assets</p>
          <p id="menu-version" class="menu-version"></p>

          <div class="menu-button-container">
            <button id="btn-menu-campaign" class="menu-button">Active Contracts</button>
            <button id="btn-menu-custom" class="menu-button">
              Simulated Operations
            </button>
            <button id="btn-menu-engineering" class="menu-button">
              Asset Engineering
            </button>
            <button id="btn-menu-statistics" class="menu-button">
              Operational Statistics
            </button>
            <button id="btn-menu-settings" class="menu-button">Terminal Settings</button>

            <div class="menu-import-section">
              <label for="import-replay" class="menu-import-label"
                >Import Operational Data (JSON)</label
              >
              <input
                type="file"
                id="import-replay"
                accept=".json"
                style="display: none"
              />
            </div>
          </div>
        </div>
      </div>

      <!-- 2. Campaign Shell wrapper -->
      <div id="screen-campaign-shell" class="screen">
        <!-- Content will be injected by CampaignShell.ts -->
        <div
          id="campaign-shell-content"
          class="flex-grow relative overflow-hidden flex-col"
          style="min-height: 0; display: flex;"
        >
          <!-- 2a. Campaign Screen -->
          <div id="screen-campaign" class="screen screen-centered"></div>

          <!-- 2b. Equipment Screen -->
          <div id="screen-equipment" class="screen">
            <!-- Content will be injected by EquipmentScreen.ts -->
          </div>

          <!-- 2c. Statistics Screen -->
          <div id="screen-statistics" class="screen">
            <!-- Content will be injected by StatisticsScreen.ts -->
          </div>

          <!-- 2e. Engineering Screen -->
          <div id="screen-engineering" class="screen">
            <!-- Content will be injected by EngineeringScreen.ts -->
          </div>

          <!-- 2f. Settings Screen -->
          <div id="screen-settings" class="screen">
            <!-- Content will be injected by SettingsScreen.ts -->
          </div>

          <!-- 2f. Mission Setup Screen -->
          <div id="screen-mission-setup" class="screen h-full overflow-hidden">
            <h1 id="mission-setup-title" style="flex-shrink: 0; margin-bottom: 0; padding-top: 20px;">Operation Configuration</h1>
            <div
              id="mission-setup-context"
              style="
                flex-shrink: 0;
                margin-bottom: 10px;
                color: var(--color-primary);
                font-weight: bold;
                letter-spacing: 1px;
              "
            ></div>
            <div id="setup-content">
              <div id="map-config-section" style="width: 100%">
                <div class="control-group">
                  <label for="map-generator-type">Generator Type:</label>
                  <select id="map-generator-type">
                    <option value="DenseShip">Dense Ship</option>
                    <option value="TreeShip">Tree Ship</option>
                    <option value="Procedural">Procedural</option>
                    <option value="Static">Static Map</option>
                  </select>
                </div>

                <div class="control-group">
                  <label for="mission-type">Operation Protocol:</label>
                  <select id="mission-type">
                    <option value="Default">Default (Target Recovery)</option>
                    <option value="RecoverIntel">Target Recovery</option>
                    <option value="ExtractArtifacts">Asset Salvage</option>
                    <option value="DestroyHive">Neutralize Nest</option>
                    <option value="EscortVIP">VIP Protection</option>
                  </select>
                </div>

                <div class="control-group">
                  <label>Game Options:</label>
                  <div
                    class="flex-row gap-10"
                    style="flex-wrap: wrap; margin-top: 5px"
                  >
                    <label
                      style="
                        display: flex;
                        align-items: center;
                        gap: 5px;
                        margin-top: 0;
                        cursor: pointer;
                        font-size: 0.8em;
                      "
                    >
                      <input type="checkbox" id="toggle-fog-of-war" checked />
                      Fog
                    </label>
                    <label
                      style="
                        display: flex;
                        align-items: center;
                        gap: 5px;
                        margin-top: 0;
                        cursor: pointer;
                        font-size: 0.8em;
                      "
                    >
                      <input type="checkbox" id="toggle-debug-overlay" /> Debug
                    </label>
                    <label
                      style="
                        display: flex;
                        align-items: center;
                        gap: 5px;
                        margin-top: 0;
                        cursor: pointer;
                        font-size: 0.8em;
                      "
                    >
                      <input type="checkbox" id="toggle-los-overlay" /> Line of Sight
                    </label>
                    <label
                      style="
                        display: flex;
                        align-items: center;
                        gap: 5px;
                        margin-top: 0;
                        cursor: pointer;
                        font-size: 0.8em;
                      "
                    >
                      <input
                        type="checkbox"
                        id="toggle-agent-control"
                        checked
                      />
                      AI
                    </label>
                    <label
                      style="
                        display: flex;
                        align-items: center;
                        gap: 5px;
                        margin-top: 0;
                        cursor: pointer;
                        font-size: 0.8em;
                      "
                    >
                      <input type="checkbox" id="toggle-manual-deployment" />
                      Deployment
                    </label>
                    <label
                      style="
                        display: flex;
                        align-items: center;
                        gap: 5px;
                        margin-top: 0;
                        cursor: pointer;
                        font-size: 0.8em;
                      "
                    >
                      <input
                        type="checkbox"
                        id="toggle-allow-tactical-pause"
                        checked
                      />
                      Pause
                    </label>
                  </div>
                </div>

                <div class="control-group">
                  <div id="preset-map-controls">
                    <label for="map-seed">Map Seed:</label>
                    <input type="number" id="map-seed" placeholder="Random" />

                    <div style="display: flex; gap: 10px">
                      <div style="flex: 1">
                        <label for="map-width">Width:</label>
                        <input type="number" id="map-width" value="10" />
                      </div>
                      <div style="flex: 1">
                        <label for="map-height">Height:</label>
                        <input type="number" id="map-height" value="10" />
                      </div>
                    </div>

                    <label for="map-spawn-points"
                      >Enemy Spawns:
                      <span id="map-spawn-points-value">3</span></label
                    >
                    <input
                      type="range"
                      id="map-spawn-points"
                      value="3"
                      min="1"
                      max="10"
                      step="1"
                    />

                    <label for="map-starting-threat"
                      >Starting Threat:
                      <span id="map-starting-threat-value">0</span>%</label
                    >
                    <input
                      type="range"
                      id="map-starting-threat"
                      min="0"
                      max="100"
                      step="5"
                      value="0"
                    />

                    <label for="map-base-enemies"
                      >Base Wave Size:
                      <span id="map-base-enemies-value">3</span></label
                    >
                    <input
                      type="range"
                      id="map-base-enemies"
                      value="3"
                      min="1"
                      max="20"
                      step="1"
                    />

                    <label for="map-enemy-growth"
                      >Wave Growth:
                      <span id="map-enemy-growth-value">1.0</span></label
                    >
                    <input
                      type="range"
                      id="map-enemy-growth"
                      value="1.0"
                      min="0.1"
                      max="5.0"
                      step="0.1"
                    />
                  </div>

                  <div id="static-map-controls" style="display: none">
                    <h3>Static Map</h3>
                    <textarea
                      id="static-map-json"
                      rows="5"
                      placeholder="Paste JSON MapDefinition here..."
                    ></textarea>
                    <button id="load-static-map">Load JSON</button>
                    <input type="file" id="upload-static-map" accept=".json" />

                    <h3 style="margin-top: 15px">ASCII Map</h3>
                    <textarea
                      id="ascii-map-input"
                      rows="5"
                      placeholder="Paste ASCII map here..."
                    ></textarea>
                    <button id="convert-ascii-to-map">Convert ASCII</button>
                  </div>
                </div>
              </div>

              <div class="control-group squad-builder-group">
                <div id="squad-builder"></div>
              </div>
            </div>

            <div class="mission-setup-footer flex-row justify-between align-center p-20 w-full" style="flex-shrink: 0; border-top: 1px solid var(--color-border-strong); background: var(--color-surface);">
              <button id="btn-setup-back" class="back-button" style="margin-top: 0">Back</button>
              <div class="flex-row gap-10">
                <button
                  id="btn-goto-equipment"
                  class="primary-button"
                  style="padding: 12px 24px; margin-top: 0"
                >
                  Equipment & Supplies
                </button>
                <button
                  id="btn-launch-mission"
                  class="primary-button"
                  style="padding: 12px 24px; margin-top: 0"
                >
                  Authorize Operation
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 4. Mission Screen (Game Loop) -->
      <div id="screen-mission" class="screen">
        <!-- HUD will be injected by HUDManager.ts -->
        <div
          id="mission-body"
          style="
            display: flex;
            flex-grow: 1;
            overflow: hidden;
            background: #000;
          "
        >
          <div
            id="game-container"
            style="
              flex-grow: 1;
              display: flex;
              justify-content: center;
              align-items: center;
              position: relative;
            "
          >
            <canvas id="game-canvas"></canvas>
          </div>
        </div>
      </div>

      <!-- 5. Debrief Screen -->
      <div id="screen-debrief" class="screen debrief-screen">
        <!-- Content will be injected by DebriefScreen.ts -->
      </div>

      <!-- 6. Campaign Summary Screen -->
      <div
        id="screen-campaign-summary"
        class="screen"
        style="
          z-index: 1100;
          background: rgba(0, 0, 0, 0.9);
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
        "
      >
        <!-- Content will be injected by CampaignSummaryScreen.ts -->
      </div>

      <!-- Global Overlay Screens -->
    </div>
    <!-- End of #app -->

    <div id="modal-container"></div>
    <script type="module" src="/renderer/main.ts"></script>
  </body>
</html>
